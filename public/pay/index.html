<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lokmanya Mess - Secure UPI Payment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
      --text-secondary: #94a3b8;
      --primary: #f97316;
      --primary-hover: #ea580c;
      --border: #334155;
      
      --gpay: #1a73e8;
      --phonepe: #5f259f;
      --paytm: #00baf2;
      --bhim: #e11d48;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-container {
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
    }

    .logo-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f97316, #ea580c);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 28px;
      font-weight: 800;
      box-shadow: 0 10px 15px -3px rgba(249, 115, 22, 0.4);
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .amount-card {
      background-color: rgba(249, 115, 22, 0.08);
      border: 1px dashed var(--primary);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 28px;
    }

    .amount-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--primary);
      font-weight: 700;
      margin-bottom: 4px;
    }

    .amount-value {
      font-size: 36px;
      font-weight: 800;
      color: var(--text);
    }

    .app-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .app-btn {
      width: 100%;
      height: 52px;
      border-radius: 12px;
      border: none;
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: transform 0.2s, filter 0.2s;
    }

    .app-btn:active {
      transform: scale(0.98);
    }

    .app-btn:hover {
      filter: brightness(1.15);
    }

    .gpay-btn { background-color: var(--gpay); }
    .phonepe-btn { background-color: var(--phonepe); }
    .paytm-btn { background-color: var(--paytm); }
    .bhim-btn { background-color: var(--bhim); }

    .qr-container {
      margin-top: 24px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .qr-image {
      width: 200px;
      height: 200px;
      background-color: white;
      padding: 12px;
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .qr-text {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .footer {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 16px;
    }

    @media (min-width: 768px) {
      .app-list {
        display: none;
      }
      .qr-container {
        display: flex;
      }
      .subtitle {
        margin-bottom: 12px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo-container">
      <div class="logo-circle">LM</div>
    </div>
    <div class="title" id="payee-title">Lokmanya Mess</div>
    <div class="subtitle" id="payment-subtitle">Secure UPI Payment Portal</div>

    <div class="amount-card">
      <div class="amount-label">Amount Outstanding</div>
      <div class="amount-value" id="amount-val">₹0.00</div>
    </div>

    <!-- Mobile view: Click to open preferred app directly -->
    <div class="app-list">
      <button class="app-btn gpay-btn" onclick="payWith('gpay')">
        Google Pay
      </button>
      <button class="app-btn phonepe-btn" onclick="payWith('phonepe')">
        PhonePe
      </button>
      <button class="app-btn paytm-btn" onclick="payWith('paytm')">
        Paytm
      </button>
      <button class="app-btn bhim-btn" onclick="payWith('bhim')">
        Other UPI App
      </button>
    </div>

    <!-- Desktop view: Scan QR code -->
    <div class="qr-container" id="qr-block">
      <img class="qr-image" id="qr-img" src="" alt="UPI QR Code">
      <div class="qr-text">Scan this QR code with any UPI app to pay</div>
    </div>

    <div class="footer">
      Secured via NPCI Unified Payments Interface (UPI)
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const pa = params.get('pa') || 'lokmanya@upi';
    const pn = params.get('pn') || 'Lokmanya Mess';
    const am = params.get('am') || '0';
    const tn = params.get('tn') || 'Mess Dues';

    document.getElementById('payee-title').textContent = decodeURIComponent(pn);
    document.getElementById('amount-val').textContent = `₹${parseFloat(am).toFixed(2)}`;

    const upiUri = `upi://pay?pa=${pa}&pn=${encodeURIComponent(pn)}&am=${am}&cu=INR&tn=${encodeURIComponent(tn)}`;

    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upiUri)}`;
    document.getElementById('qr-img').src = qrUrl;

    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    if (!isMobile) {
      document.getElementById('qr-block').style.display = 'flex';
    } else {
      if (window.innerWidth >= 768) {
        document.getElementById('qr-block').style.display = 'flex';
      }
    }

    function payWith(app) {
      let targetUrl = upiUri;
      const isAndroid = /Android/i.test(navigator.userAgent);
      
      if (isAndroid) {
        if (app === 'gpay') {
          targetUrl = `intent://pay?pa=${pa}&pn=${encodeURIComponent(pn)}&am=${am}&cu=INR&tn=${encodeURIComponent(tn)}#Intent;scheme=upi;package=com.google.android.apps.nbu.paisa.user;end`;
        } else if (app === 'phonepe') {
          targetUrl = `intent://pay?pa=${pa}&pn=${encodeURIComponent(pn)}&am=${am}&cu=INR&tn=${encodeURIComponent(tn)}#Intent;scheme=upi;package=com.phonepe.app;end`;
        } else if (app === 'paytm') {
          targetUrl = `intent://pay?pa=${pa}&pn=${encodeURIComponent(pn)}&am=${am}&cu=INR&tn=${encodeURIComponent(tn)}#Intent;scheme=upi;package=net.one97.paytm;end`;
        } else if (app === 'bhim') {
          targetUrl = `intent://pay?pa=${pa}&pn=${encodeURIComponent(pn)}&am=${am}&cu=INR&tn=${encodeURIComponent(tn)}#Intent;scheme=upi;package=in.org.npci.upiapp;end`;
        }
      } else {
        if (app === 'gpay') {
          targetUrl = `gpay://upi/pay?pa=${pa}&pn=${encodeURIComponent(pn)}&am=${am}&cu=INR&tn=${encodeURIComponent(tn)}`;
        } else if (app === 'phonepe') {
          targetUrl = `phonepe://pay?pa=${pa}&pn=${encodeURIComponent(pn)}&am=${am}&cu=INR&tn=${encodeURIComponent(tn)}`;
        } else if (app === 'paytm') {
          targetUrl = `paytmmp://pay?pa=${pa}&pn=${encodeURIComponent(pn)}&am=${am}&cu=INR&tn=${encodeURIComponent(tn)}`;
        }
      }

      window.location.href = targetUrl;
    }
  </script>
</body>
</html>
